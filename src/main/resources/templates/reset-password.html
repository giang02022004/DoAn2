<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Laptopshop - Đặt lại mật khẩu</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;800&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="container-fluid page-header py-5">
        <h1 class="text-center text-white display-6">Đặt lại mật khẩu</h1>
    </div>

    <div class="container-fluid py-5">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="bg-light rounded p-5 shadow-sm">
                        <h3 class="mb-4 text-center text-primary">Đặt lại mật khẩu mới</h3>
                        
                        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

                        <form th:action="@{/reset-password}" method="post" id="resetForm">
                            <input type="hidden" name="token" th:value="${token}">
                            
                            <div class="mb-4">
                                <label class="form-label">Mật khẩu mới<sup>*</sup></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0">
                                        <i class="fas fa-lock text-primary"></i>
                                    </span>
                                    <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="Nhập mật khẩu mới" required minlength="6">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Xác nhận mật khẩu<sup>*</sup></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0">
                                        <i class="fas fa-check-circle text-primary"></i>
                                    </span>
                                    <input type="password" class="form-control border-start-0" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                                </div>
                                <div id="passwordError" class="text-danger small mt-1 d-none">Mật khẩu không khớp.</div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary border-0 py-3 px-4 text-uppercase w-100 text-white fw-bold shadow-sm">Cập nhật mật khẩu</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirmPassword').value;
            var errorDiv = document.getElementById('passwordError');
            
            if (password !== confirmPassword) {
                e.preventDefault();
                errorDiv.classList.remove('d-none');
            } else {
                errorDiv.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
