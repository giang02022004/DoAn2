<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Laptopshop - Quên mật khẩu</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;800&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="container-fluid page-header py-5">
        <h1 class="text-center text-white display-6">Quên mật khẩu</h1>
    </div>

    <div class="container-fluid py-5">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="bg-light rounded p-5 shadow-sm">
                        <h3 class="mb-4 text-center text-primary">Khôi phục mật khẩu</h3>
                        
                        <div th:if="${success}" class="alert alert-success" role="alert" th:text="${success}"></div>
                        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

                        <form th:action="@{/forgot-password}" method="post">
                            <p class="mb-4 text-muted text-center">Nhập email của bạn và chúng tôi sẽ gửi cho bạn liên kết để đặt lại mật khẩu.</p>
                            
                            <div class="mb-4">
                                <label class="form-label">Địa chỉ Email<sup>*</sup></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0">
                                        <i class="fas fa-envelope text-primary"></i>
                                    </span>
                                    <input type="email" class="form-control border-start-0" name="email" placeholder="Nhập email của bạn..." required>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary border-0 py-3 px-4 text-uppercase w-100 text-white fw-bold shadow-sm">Gửi yêu cầu</button>
                            
                            <div class="text-center mt-3">
                                <a th:href="@{/login}" class="text-muted small"><i class="fas fa-arrow-left me-1"></i> Quay lại đăng nhập</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
