<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::title}, ~{::#pageHeader}, ~{::#content})}">
<head>
    <title>Sửa Sản Phẩm &mdash; Admin</title>
</head>
<body>
    <span id="pageHeader">Sửa Sản Phẩm</span>
    <div id="content">
        <div style="padding-top:10px;">
            <div class="mat-card">
                <div class="mat-card-header d-flex justify-content-between align-items-center"
                     style="background:linear-gradient(135deg,#2a83e9,#1a6cc8);border-radius:6px 6px 0 0;padding:16px 22px;">
                    <div>
                        <h5 class="mb-0 text-white"><i class="fas fa-edit me-2"></i>Chỉnh Sửa Thông Tin Sản Phẩm</h5>
                        <p class="mb-0 small" style="color:rgba(255,255,255,.75);" th:text="'ID: ' + ${product.id} + ' - ' + ${product.tenSanPham}"></p>
                    </div>
                    <a th:href="@{/admin/products}" class="btn btn-light btn-sm fw-semibold text-dark">
                        <i class="fas fa-arrow-left me-1"></i>Quay Lại
                    </a>
                </div>

                <div class="p-4">
                    <!-- Báo lỗi / thành công (nếu có) -->
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                    <!-- Form cập nhật dữ liệu sản phẩm -->
                    <form th:action="@{/admin/products/update}" method="post">
                        <!-- Trường ẩn ID để Backend biết đang sửa sản phẩm nào -->
                        <input type="hidden" name="id" th:value="${product.id}" />

                        <div class="row">
                            <div class="col-md-8">
                                <!-- Tên Sản Phẩm -->
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Tên Sản Phẩm <span class="text-danger">*</span></label>
                                    <input type="text" name="tenSanPham" class="form-control" th:value="${product.tenSanPham}" required>
                                </div>
                                
                                <div class="row">
                                    <!-- Giá -->
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Giá Bán (VNĐ) <span class="text-danger">*</span></label>
                                        <input type="number" name="gia" class="form-control" th:value="${product.gia}" required min="0">
                                    </div>
                                    <!-- Số Lượng -->
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Số Lượng Tồn Kho <span class="text-danger">*</span></label>
                                        <input type="number" name="soLuong" class="form-control" th:value="${product.soLuong}" required min="0">
                                    </div>
                                </div>

                                <div class="row">
                                    <!-- Hãng Sản Xuất -->
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Hãng Sản Xuất <span class="text-danger">*</span></label>
                                        <select name="hangSanXuat.id" class="form-select" required>
                                            <option th:each="cat : ${categories}" 
                                                    th:value="${cat.id}" 
                                                    th:text="${cat.tenHang}"
                                                    th:selected="${product.hangSanXuat != null and cat.id == product.hangSanXuat.id}">
                                            </option>
                                        </select>
                                    </div>
                                    <!-- Loại Sản Phẩm -->
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Loại Sản Phẩm <span class="text-danger">*</span></label>
                                        <select name="loaiSanPham.id" class="form-select" required>
                                            <option th:each="type : ${types}" 
                                                    th:value="${type.id}" 
                                                    th:text="${type.tenLoai == 'LAPTOP' ? 'Laptop' : (type.tenLoai == 'PHU_KIEN' ? 'Phụ Kiện' : type.tenLoai)}"
                                                    th:selected="${product.loaiSanPham != null and type.id == product.loaiSanPham.id}">
                                            </option>
                                        </select>
                                    </div>
                                </div>

                                <!-- Hình Ảnh (Path Text Input) -->
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Tên File Hình Ảnh (VD: laptop-dell.jpg)</label>
                                    <input type="text" name="hinhAnh" class="form-control" th:value="${product.hinhAnh}">
                                    <small class="text-muted">Đường dẫn ảnh sẽ được tự động cộng thêm /img/ ở Frontend.</small>
                                </div>
                            </div>
                            
                            <div class="col-md-4">
                                <!-- Box Hiển Thị Ảnh Hiện Tại -->
                                <div class="card mb-3">
                                    <div class="card-header bg-light fw-bold">Ảnh Hiện Tại</div>
                                    <div class="card-body text-center">
                                        <img th:src="@{'/img/' + ${product.hinhAnh}}" alt="Ảnh Sản Phẩm" style="max-width: 100%; border-radius: 8px; border: 1px solid #ddd; padding: 4px;">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Sản phẩm đã bán</label>
                                    <input type="number" class="form-control bg-light" th:value="${product.daBan != null ? product.daBan : 0}" readonly>
                                </div>
                            </div>
                        </div>

                        <!-- Mô Tả Ngắn -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mô Tả Ngắn</label>
                            <textarea name="moTaNgan" class="form-control" rows="3" th:text="${product.moTaNgan}"></textarea>
                        </div>

                        <!-- Mô Tả Chi Tiết -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mô Tả Chi Tiết</label>
                            <!-- TODO: Tích hợp thư viện WYSIWYG Editor chỗ này trong tương lai -->
                            <textarea name="moTaChiTiet" class="form-control" rows="8" th:text="${product.moTaChiTiet}"></textarea>
                        </div>

                        <hr>
                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/admin/products}" class="btn btn-secondary">Hủy Bỏ</a>
                            <button type="submit" class="btn btn-danger text-white">
                                <i class="fas fa-save me-1"></i>Lưu Thay Đổi
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
