<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout :: layout(~{::title}, ~{::#pageHeader}, ~{::#content})}">
<head><title>Quản Lý Bài Viết &mdash; Admin</title></head>
<body>
    <span id="pageHeader">Quản Lý Bài Viết / Tin Tức</span>
    <div id="content">
        <div style="padding-top:10px;">
        <div class="mat-card">
            
            <div class="mat-card-header d-flex justify-content-between align-items-center"
                 style="background:linear-gradient(135deg,#00b09b,#96c93d);border-radius:6px 6px 0 0;padding:16px 22px;">
                <div>
                    <h5 class="mb-0 text-white"><i class="fas fa-newspaper me-2"></i>Danh Sách Bài Viết</h5>
                    <p class="mb-0 small" style="color:rgba(255,255,255,.85);">Kênh thông tin, tin tức, và review sản phẩm</p>
                </div>
                <a th:href="@{/admin/articles/create}" class="btn btn-warning btn-sm fw-semibold text-white shadow-sm">
                    <i class="fas fa-plus me-1"></i>Viết Bài Mới
                </a>
            </div>

            <!-- Search bar -->
            <form th:action="@{/admin/articles}" method="get" class="d-flex align-items-center gap-2 p-3 border-bottom bg-light">
                <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm kiếm tựa đề bài viết..." style="max-width:300px;">
                <select name="trangThai" class="form-select" style="max-width:200px;" onchange="this.form.submit()">
                    <option value="ALL" th:selected="${trangThai == 'ALL'}">-- Tất cả trạng thái --</option>
                    <option value="ACTIVE" th:selected="${trangThai == 'ACTIVE'}">Cho phép hiển thị (Active)</option>
                    <option value="DRAFT" th:selected="${trangThai == 'DRAFT'}">Bản nháp (Draft)</option>
                    <option value="INACTIVE" th:selected="${trangThai == 'INACTIVE'}">Tạm ẩn (Inactive)</option>
                </select>
                <button type="submit" class="btn btn-primary btn-sm text-white">
                    <i class="fas fa-filter me-1"></i>Lọc
                </button>
            </form>

            <div th:if="${success}" class="alert alert-success m-3" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger m-3" th:text="${error}"></div>

            <!-- Table -->
            <div class="table-responsive">
                <table class="mat-table w-100">
                    <thead>
                        <tr>
                            <th width="5%">ID</th>
                            <th width="10%">Hình Ảnh</th>
                            <th width="35%">Tiêu Đề</th>
                            <th width="15%">Người Đăng</th>
                            <th width="15%">Trạng Thái</th>
                            <th width="10%">Ngày Tạo</th>
                            <th width="10%">Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="art : ${articles}" th:if="${not #lists.isEmpty(articles)}">
                            <td class="fw-bold text-muted" th:text="${'#' + art.id}">#1</td>
                            <td>
                                <img th:if="${art.hinhAnh != null}" th:src="@{'/img/' + ${art.hinhAnh}}" alt="Thumb" style="width: 60px; height: 40px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd;">
                                <span th:if="${art.hinhAnh == null}" class="badge bg-secondary">No Image</span>
                            </td>
                            <td>
                                <div class="fw-bold text-dark text-truncate" style="max-width: 300px;" th:text="${art.tieuDe}">Tiêu đề</div>
                                <div class="small text-muted text-truncate" style="max-width: 300px;" th:text="${art.noiDungNgan}">Mô tả ngắn</div>
                            </td>
                            <td>
                                <span class="badge bg-light text-dark border" th:text="${art.tacGia != null ? art.tacGia.hoTen : 'Admin'}">Tác Giả</span>
                            </td>
                            <td>
                                <span th:if="${art.trangThai == 'ACTIVE'}" class="badge bg-success">Hiển thị</span>
                                <span th:if="${art.trangThai == 'INACTIVE'}" class="badge bg-danger">Tạm Ẩn</span>
                                <span th:if="${art.trangThai == 'DRAFT'}" class="badge bg-warning text-dark">Bản Nháp</span>
                            </td>
                            <td class="small" th:text="${#temporals.format(art.ngayTao, 'dd/MM/yyyy')}">01/01/2026</td>
                            <td>
                                <div class="d-flex gap-1 justify-content-center">
                                    <a th:href="@{|/admin/articles/edit/${art.id}|}" class="btn btn-sm btn-outline-primary" style="padding: 2px 8px;" title="Chỉnh sửa">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a th:href="@{|/admin/articles/delete/${art.id}|}" 
                                       class="btn btn-sm btn-outline-danger" 
                                       style="padding: 2px 8px;" 
                                       title="Xóa bài viết"
                                       onclick="return confirm('Bạn có chắc chắn muốn xóa bài viết này không?');">
                                        <i class="fas fa-trash-alt"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        
                        <tr th:if="${#lists.isEmpty(articles)}">
                            <td colspan="7" class="text-center py-5 text-muted">
                                <i class="fas fa-file-alt fa-3x d-block mb-3 opacity-25"></i>
                                Không tìm thấy bài viết nào.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Phân trang cơ bản -->
            <div th:if="${totalPages > 1}" class="card-footer bg-white d-flex justify-content-end p-3 align-items-center">
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <!-- Nút Previous -->
                        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/articles(page=${currentPage - 1}, keyword=${keyword}, trangThai=${trangThai})}">Trước</a>
                        </li>
                        
                        <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
                            <a class="page-link" th:href="@{/admin/articles(page=${i}, keyword=${keyword}, trangThai=${trangThai})}" th:text="${i}">1</a>
                        </li>
                        
                        <!-- Nút Next -->
                        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/articles(page=${currentPage + 1}, keyword=${keyword}, trangThai=${trangThai})}">Sau</a>
                        </li>
                    </ul>
                </nav>
            </div>
            
        </div>
        </div>
    </div>
</body>
</html>
