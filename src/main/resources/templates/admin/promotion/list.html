<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh Sách Khuyến Mãi</title>
</head>
<body>
<div th:replace="~{admin/layout :: layout(title=~{::title}, pageHeader=~{::.page-title}, content=~{::.promotion-content})}">
    <h2 class="page-title">Danh Sách Khuyến Mãi</h2>
    <div class="promotion-content">
        <!-- Add alert -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="mat-card">
            <div class="mat-card-header d-flex justify-content-between align-items-center">
                <div>
                    <h5>Danh Sách Khuyến Mãi</h5>
                    <p>Quản lý các chương trình ưu đãi, giảm giá</p>
                </div>
                <!-- Search and Add -->
                <div class="d-flex gap-2">
                    <form th:action="@{/admin/promotions}" method="get" class="d-flex position-relative">
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm tên KM..." style="padding-left: 35px; width: 250px;">
                        <i class="fas fa-search position-absolute" style="left: 12px; top: 11px; color: #aaa;"></i>
                        <button type="submit" class="btn btn-primary ms-2"><i class="fas fa-filter me-1"></i> Lọc</button>
                    </form>
                    <a th:href="@{/admin/promotions/create}" class="btn btn-outline-primary fw-bold" style="white-space: nowrap;">
                        <i class="fas fa-plus me-1"></i> Thêm Mới
                    </a>
                </div>
            </div>
            <div class="table-responsive">
                <table class="mat-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên Chương Trình</th>
                            <th>Giảm (%)</th>
                            <th>Bắt Đầu</th>
                            <th>Kết Thúc</th>
                            <th class="text-center">Trạng Thái</th>
                            <th class="text-center">Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${khuyenMaiPage.empty}">
                            <td colspan="7" class="text-center text-muted py-4">Không tìm thấy dữ liệu khuyến mãi nào.</td>
                        </tr>
                        <tr th:each="km : ${khuyenMaiPage.content}">
                            <td th:text="${km.id}">1</td>
                            <td class="fw-bold text-primary" th:text="${km.tenKhuyenMai}">Giảm giá dịp lễ</td>
                            <td><span class="badge bg-danger fs-6" th:text="'-' + ${km.phanTramGiam} + '%'">-10%</span></td>
                            <td th:text="${#temporals.format(km.ngayBatDau, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${#temporals.format(km.ngayKetThuc, 'dd/MM/yyyy HH:mm')}"></td>
                            <td class="text-center">
                                <span th:if="${km.trangThai == 'ACTIVE'}" class="mat-badge success"><i class="fas fa-play-circle me-1"></i> Đang chạy</span>
                                <span th:if="${km.trangThai == 'INACTIVE'}" class="mat-badge warning"><i class="fas fa-pause-circle me-1"></i> Tạm dừng</span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/admin/promotions/edit/{id}(id=${km.id})}" class="btn btn-sm btn-outline-primary" title="Sửa"><i class="fas fa-edit"></i></a>
                                <a th:href="@{/admin/promotions/delete/{id}(id=${km.id})}" class="btn btn-sm btn-outline-danger" title="Xóa" onclick="return confirm('Bạn có chắc muốn xóa khuyến mãi này?');"><i class="fas fa-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination -->
            <div class="p-3 border-top" th:if="${totalPages > 1}">
                <nav>
                    <ul class="pagination justify-content-end mb-0">
                        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/promotions(page=${currentPage - 1}, keyword=${keyword})}">Trước</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
                            <a class="page-link" th:href="@{/admin/promotions(page=${i}, keyword=${keyword})}" th:text="${i}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/promotions(page=${currentPage + 1}, keyword=${keyword})}">Sau</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
</body>
</html>
